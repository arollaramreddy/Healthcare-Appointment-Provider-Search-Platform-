spring:
  application:
    name: healthcare-appointments
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/appointments}
    username: ${DATABASE_USERNAME:appointments}
    password: ${DATABASE_PASSWORD:appointments}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2s
  elasticsearch:
    uris: ${ELASTICSEARCH_URIS:http://localhost:9200}
  cache:
    type: redis
    redis:
      time-to-live: 10m
      cache-null-values: false

server:
  port: ${PORT:8080}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized

springdoc:
  swagger-ui:
    path: /docs
